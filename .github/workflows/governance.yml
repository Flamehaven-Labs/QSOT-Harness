name: Governance Gate

# Claim-integrity & OPSEC gate. Fails the build if any tracked file contains a
# local-workspace path leak or a Stage A forbidden overclaim phrase. Mirrors the
# Flamehaven sanitizer governance pattern; keeps the published surface honest.
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  claim-integrity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Claim-integrity / OPSEC governance gate
        run: python scripts/governance_check.py
