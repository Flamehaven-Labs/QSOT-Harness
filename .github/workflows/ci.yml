name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v5

    - name: Set up Python 3.10
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Install system libraries (BLAS backend for the turbovec sidecar)
      run: |
        sudo apt-get update
        sudo apt-get install -y libopenblas-dev gfortran pkg-config

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install .[dev,torch]

    - name: Compile Rust sidecar
      run: |
        cd src/qsot_v2/rust_sidecar
        cargo build --release

    - name: Lint with Ruff
      run: ruff check src tests run_experiment.py

    - name: Format check with Black
      run: black --check --line-length 99 src tests run_experiment.py

    - name: Run pytest with coverage
      run: python -m pytest --cov=qsot_v2 --cov-report=xml --cov-fail-under=90

    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v5
      with:
        files: ./coverage.xml
        fail_ci_if_error: false
